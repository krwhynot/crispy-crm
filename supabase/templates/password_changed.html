<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
      }
      .container {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      .header {
        text-align: center;
        padding: 10px 0;
      }
      .header h2 {
        margin: 0;
        color: #333333;
      }
      .content {
        padding: 20px;
        line-height: 1.6;
        color: #555555;
      }
      .content p {
        margin: 0 0 10px;
      }
      .alert {
        padding: 12px;
        background-color: #fff3cd;
        border: 1px solid #ffc107;
        border-radius: 5px;
        margin: 15px 0;
        color: #856404;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Password Changed</h2>
      </div>
      <div class="content">
        <p>Hello,</p>
        <p>The password for your Masterfoods CRM account ({{ .Email }}) was recently changed.</p>
        <div class="alert">
          <strong>If you did not make this change,</strong> please contact your Masterfoods CRM
          administrator immediately to secure your account.
        </div>
        <p>The Masterfoods CRM team</p>
      </div>
    </div>
  </body>
</html>
