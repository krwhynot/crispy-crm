name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Code Health Check
        run: |
          echo "=== Code Health Check (CI/CD Enforced) ==="
          echo "Checking for high-churn files (14 days, threshold: 16 edits)..."
          HIGH_CHURN=$(git log --name-only --since="14 days ago" --pretty=format: -- 'src/**/*.ts' 'src/**/*.tsx' \
            | grep -v '^$' | sort | uniq -c | sort -rn \
            | awk '$1 >= 16 {print $1, $2}')
          if [ -n "$HIGH_CHURN" ]; then
            echo "CHURN THRESHOLD EXCEEDED:"
            echo "$HIGH_CHURN"
            echo "Action Required: Files with 16+ edits in 14 days need architectural review."
            exit 1
          else
            echo "All files below churn threshold"
          fi

      - name: UI Pattern Compliance — native select
        run: |
          echo "Checking for native <select> elements in src/atomic-crm/..."
          if grep -rn '<select' src/atomic-crm/ --include="*.tsx" --include="*.ts" | grep -v '\.test\.' | grep -v '__tests__'; then
            echo ""
            echo "ERROR: Native <select> elements found in src/atomic-crm/"
            echo "Use React Admin's SelectInput or shadcn Select component instead."
            exit 1
          fi
          echo "No native <select> violations found."

      - name: UI Pattern Compliance — hardcoded colors
        run: |
          echo "Checking for hardcoded color classes in src/atomic-crm/..."
          VIOLATIONS=$(grep -rn -E '(border-neutral-|bg-gray-|text-gray-|border-gray-|bg-neutral-|text-neutral-)' src/atomic-crm/ --include="*.tsx" --include="*.ts" | grep -v '\.test\.' | grep -v '__tests__' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "$VIOLATIONS"
            echo ""
            echo "ERROR: Hardcoded color classes found in src/atomic-crm/"
            echo "Use semantic Tailwind classes instead."
            exit 1
          fi
          echo "No hardcoded color violations found."

      - name: UI Pattern Compliance — direct RA input imports
        run: |
          echo "Checking for direct react-admin input imports in src/atomic-crm/..."
          VIOLATIONS=$(grep -rn "import.*\(TextInput\|SelectInput\|NumberInput\|DateInput\|BooleanInput\|AutocompleteInput\).*from 'react-admin'" src/atomic-crm/ --include="*.tsx" --include="*.ts" | grep -v '\.test\.' | grep -v '__tests__' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "$VIOLATIONS"
            echo ""
            echo "ERROR: Direct react-admin input imports found in src/atomic-crm/"
            echo "Import inputs from @/components/admin/ wrappers instead."
            exit 1
          fi
          echo "No direct react-admin input import violations found."

      - name: Guardrails (Baseline)
        continue-on-error: true
        run: |
          npm run guardrail:mutation-integrity
          npm run guardrail:schema-strip
          npm run guardrail:handler-chain

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run Tests
        run: npm run test:ci

  build:
    name: Build
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key
